name: "🔧 Apply V112 (Fib-Cluster-Engine)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v112:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/db.ts" ""
          write "src/core/stats.ts" ""
          write "src/core/zigzag.ts" ""
          write "src/core/fibCluster.ts" ""
          write "src/core/setups.ts" ""
          write "src/core/engine.ts" ""
          write "src/graph/ewValidator.ts" ""
          write "src/bot/commands.ts" ""
          write "src/index.ts" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v112-fib-cluster
          git add -A
          git commit -m "V112: Fib-Cluster-Engine – Konfluenz-Zonen, State Machine PENDING/CONFIRMED, Pivot-verankerter Validator"
          git push -u origin feat/v112-fib-cluster --force
          gh pr create --base main --head feat/v112-fib-cluster \
            --title "V112: Fib-Cluster-Engine statt Kill-Zone" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v112-fib-cluster"
          {
            echo "### ✅ V112 gebaut & gepusht"
            echo ""
            echo "Branch: \`feat/v112-fib-cluster\` – PR reviewen und mergen."
          } >> "$GITHUB_STEP_SUMMARY"

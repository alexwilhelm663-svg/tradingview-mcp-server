name: "🔧 Apply V125 (W-X-Y Vollmuster)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v125:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/correction.ts" ""
          write "src/core/engine.ts" ""
          write "python_service/drawer.py" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build
          python3 -m py_compile python_service/drawer.py

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v125-wxy
          git add -A
          git commit -m "V125: W-X-Y als Vollmuster (Struktur-Beweis am ersten Bein entscheidet ABC vs WXY), W-X-Y-Labels+Ziel, Regelwerk v4.4"
          git push -u origin feat/v125-wxy --force
          gh pr create --base main --head feat/v125-wxy \
            --title "V125: W-X-Y als vollwertige Lesart" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR manuell: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v125-wxy"
          {
            echo "### ✅ V125 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

name: "🔧 Apply Hotfix V113.1 (Adaptive Auflösung)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  hotfix:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien ersetzen"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/impulseFinder.ts" ""
          write "src/core/engine.ts" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B patch/v113-1-adaptive
          git add -A
          git commit -m "V113.1: Adaptive ZigZag-Aufloesungs-Leiter (25/18/12/8%) - Low-Vol-Titel zaehlbar, High-Beta unveraendert"
          git push -u origin patch/v113-1-adaptive --force
          gh pr create --base main --head patch/v113-1-adaptive \
            --title "V113.1: Adaptive Auflösungs-Leiter" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...patch/v113-1-adaptive"
          {
            echo "### ✅ Hotfix V113.1 gebaut & gepusht"
            echo ""
            echo "Branch: \`patch/v113-1-adaptive\` – PR reviewen und mergen."
          } >> "$GITHUB_STEP_SUMMARY"

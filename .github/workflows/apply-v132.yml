name: "🔧 Apply V132 (Multi-Timeframe-Konfluenz)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v132:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/confluence.ts" ""
          write "src/core/engine.ts" ""
          write "src/bot/commands.ts" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v132-konfluenz
          git add -A
          git commit -m "V132: Stille Multi-Timeframe-Konfluenz Woche->Tag - verschachtelte Validierung (Korrektur oben = Impuls unten), Fruehwarnung ohne Ueberstimmen der Hauptzaehlung; Regelwerk v5.1"
          git push -u origin feat/v132-konfluenz --force
          gh pr create --base main --head feat/v132-konfluenz \
            --title "V132: Stille Multi-Timeframe-Konfluenz" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR manuell: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v132-konfluenz"
          {
            echo "### ✅ V132 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

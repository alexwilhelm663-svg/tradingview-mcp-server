name: "🔧 Apply V117.1 (Best-über-Stufen)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v1171:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/impulseFinder.ts" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v117-1-best-over-rungs
          git add -A
          git commit -m "V117.1: Best-ueber-Stufen fuer Doktrin-Treffer, GL-1/GL-3-Scoring generalisiert, Regelwerk v3.5"
          git push -u origin feat/v117-1-best-over-rungs --force
          gh pr create --base main --head feat/v117-1-best-over-rungs \
            --title "V117.1: Best-über-Stufen + GL-1-Generalisierung" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v117-1-best-over-rungs"
          {
            echo "### ✅ V117.1 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

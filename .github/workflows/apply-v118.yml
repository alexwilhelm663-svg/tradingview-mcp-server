name: "🔧 Apply V118 (Vollendungs-Nachweis DK-9)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v118:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/impulseFinder.ts" ""
          write "src/core/completion.ts" ""
          write "src/core/engine.ts" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v118-completion
          git add -A
          git commit -m "V118: DK-9 Vollendungs-Nachweis - Sub-Zaehlung des W5-Segments, laufende Impulse erkannt, Fibonacci-Projektionen"
          git push -u origin feat/v118-completion --force
          gh pr create --base main --head feat/v118-completion \
            --title "V118: Vollendungs-Nachweis (DK-9) — läuft Welle 5 noch?" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v118-completion"
          {
            echo "### ✅ V118 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

name: ⚡ Quant Radar (3-of-3 Screener)

on:
  schedule:
    # Jeden Mo-Fr um 21:30 UTC (22:30 CET / 23:30 CEST -> Wall Street & Xetra sind zu)
    - cron: '30 21 * * 1-5'
  
  workflow_dispatch: # Erlaubt den manuellen Start per Button im GitHub UI

jobs:
  night-shift:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Repository auschecken
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 24 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Packages installieren
        run: npm install

      - name: 🎯 Screener abfeuern & Telegram Push
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npx ts-node src/radar.ts
        

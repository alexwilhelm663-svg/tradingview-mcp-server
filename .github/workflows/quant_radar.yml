name: ⚡ Quant Radar (3-of-3 Screener)

on:
  schedule:
    # Jeden Mo-Fr um 21:30 UTC (22:30 CET / 23:30 CEST -> Wall Street ist zu)
    - cron: '30 21 * * 1-5'
  
  workflow_dispatch: # WICHTIG: Erlaubt dir, den Scan JEDERZEIT per Button manuell zu testen!

jobs:
  night-shift:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Repository auschecken
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Packages installieren
        run: npm install

      - name: 🎯 Screener abfeuern
        env:
          # Wir übergeben die Telegram-Secrets, falls du den Pro-Move (unten) nutzt
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npx ts-node src/radar.ts
        

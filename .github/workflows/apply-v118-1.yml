name: "🔧 Apply V118.1 (Sub-Struktur-Detailchart)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v1181:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/completion.ts" ""
          write "src/core/chart.ts" ""
          write "src/core/engine.ts" ""
          write "src/bot/commands.ts" ""
          write "python_service/drawer.py" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build
          python3 -m py_compile python_service/drawer.py

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v118-1-detailchart
          git add -A
          git commit -m "V118.1: Sub-Struktur-Detailchart als zweite Grafik (Sub-Wellen/ED-Keil), Overlap-Klarstellung"
          git push -u origin feat/v118-1-detailchart --force
          gh pr create --base main --head feat/v118-1-detailchart \
            --title "V118.1: Sub-Struktur-Detailchart" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v118-1-detailchart"
          {
            echo "### ✅ V118.1 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

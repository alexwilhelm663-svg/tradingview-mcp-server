name: "🔧 Apply Hotfix V113.2 (Kommentar-Split)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  hotfix:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien ersetzen"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/engine.ts" ""
          write "src/core/commentary.ts" ""
          write "src/bot/commands.ts" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B patch/v113-2-kommentar
          git add -A
          git commit -m "V113.2: LLM-Kommentar als separate Nachricht, Caption kompakt, Kommentar-Budget gestrafft"
          git push -u origin patch/v113-2-kommentar --force
          gh pr create --base main --head patch/v113-2-kommentar \
            --title "V113.2: Kommentar-Split gegen abgeschnittene Captions" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...patch/v113-2-kommentar"
          {
            echo "### ✅ Hotfix V113.2 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

name: "🔧 Apply V114.1 (Regelwerk v3.0)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  rulebook:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "knowledge/rules/elliott_rules.md" ""
          write "src/core/commentary.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v114-1-regelwerk
          git add -A
          git commit -m "V114.1: Elliott-Regelwerk v3.0 - 41 Regel-IDs, Kanon/Policy-Trennung, Trace-Matrix, Kritiker liest den Kanon"
          git push -u origin feat/v114-1-regelwerk --force
          gh pr create --base main --head feat/v114-1-regelwerk \
            --title "V114.1: Elliott-Wellen-Regelwerk v3.0" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v114-1-regelwerk"
          {
            echo "### ✅ Regelwerk v3.0 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

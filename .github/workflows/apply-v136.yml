name: "🔧 Apply V136 (Multi-1-2 Frühsignal)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v136:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/multiWave.ts" ""
          write "src/core/correction.ts" ""
          write "src/core/engine.ts" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v136-multi-1-2-fruehsignal
          git add -A
          git commit -m "V136: Multi-1-2 als eigenstaendiges Fruehsignal - adaptive Aufloesung, keine Peak-Abgrenzung, Entkopplung von counterImpulsive; behebt blinden Fleck (BTC/MSFT Trendwechsel-Aufbau uebersehen); Regelwerk v5.5"
          git push -u origin feat/v136-multi-1-2-fruehsignal --force
          gh pr create --base main --head feat/v136-multi-1-2-fruehsignal \
            --title "V136: Multi-1-2 Fruehsignal (blinder Fleck behoben)" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR manuell: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v136-multi-1-2-fruehsignal"
          {
            echo "### ✅ V136 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

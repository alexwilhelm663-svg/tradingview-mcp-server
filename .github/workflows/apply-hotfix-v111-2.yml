name: "🔧 Apply Hotfix V111.2 (Sofort-ACK)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  hotfix:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien ersetzen"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/index.ts" ""
          write "src/bot/commands.ts" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B patch/webhook-ack
          git add -A
          git commit -m "V111.2: Webhook Sofort-ACK + update_id-Dedupe + In-Flight-Sperren (Fix Analyse-Endlosschleife)"
          git push -u origin patch/webhook-ack --force
          gh pr create --base main --head patch/webhook-ack \
            --title "V111.2: Sofort-ACK gegen Telegram-Retry-Schleife" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...patch/webhook-ack"
          {
            echo "### ✅ Hotfix V111.2 gebaut & gepusht"
            echo ""
            echo "Branch: \`patch/webhook-ack\` – PR reviewen und mergen."
          } >> "$GITHUB_STEP_SUMMARY"

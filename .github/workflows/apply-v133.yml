name: "🔧 Apply V133 (Impuls-These & Invalidierung)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v133:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/correction.ts" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v133-impuls-these
          git add -A
          git commit -m "V133: KO-7b Impuls-These und Invalidierung - Gegenbewegung als Welle-1-Kandidat mit HR-1-Invalidierung, zwei Lesarten (Korrektur vs Trendwechsel) mit Preis-Triggern; Regelwerk v5.2"
          git push -u origin feat/v133-impuls-these --force
          gh pr create --base main --head feat/v133-impuls-these \
            --title "V133: Impuls-These und Invalidierung" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR manuell: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v133-impuls-these"
          {
            echo "### ✅ V133 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

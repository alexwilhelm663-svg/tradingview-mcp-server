name: "🔧 Apply V130 (Umschlag ABC→1-2)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v130:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/correction.ts" ""
          write "src/core/engine.ts" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v130-umschlag
          git add -A
          git commit -m "V130: KO-7 Umschlag ABC->1-2 - Retrace-Schwellen (61.8/78.6/100%) entscheiden Korrektur vs neuer Trend, rein diagnostisch; Regelwerk v4.9"
          git push -u origin feat/v130-umschlag --force
          gh pr create --base main --head feat/v130-umschlag \
            --title "V130: Umschlag ABC->1-2" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR manuell: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v130-umschlag"
          {
            echo "### ✅ V130 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

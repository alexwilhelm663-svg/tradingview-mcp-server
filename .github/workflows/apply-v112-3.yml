name: "🔧 Apply Hotfix V112.3 (Impuls-Pflicht)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  hotfix:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien ersetzen"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/graph/ewValidator.ts" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B patch/v112-3-impuls-pflicht
          git add -A
          git commit -m "V112.3: Struktur-Vertrag - Impulszaehlung 0-5 ist Pflicht, Korrektur nur als Anhang, Trend-Konsistenz"
          git push -u origin patch/v112-3-impuls-pflicht --force
          gh pr create --base main --head patch/v112-3-impuls-pflicht \
            --title "V112.3: Impuls-Pflicht gegen korrektive Ausweich-Zählungen" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...patch/v112-3-impuls-pflicht"
          {
            echo "### ✅ Hotfix V112.3 gebaut & gepusht"
            echo ""
            echo "Branch: \`patch/v112-3-impuls-pflicht\` – PR reviewen und mergen."
          } >> "$GITHUB_STEP_SUMMARY"

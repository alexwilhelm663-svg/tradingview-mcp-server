name: "🔧 Apply V113 (Deterministische Engine)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v113:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🗑️ LangGraph-Stack entfernen"
        run: |
          git rm -rf --ignore-unmatch src/graph

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/impulseFinder.ts" ""
          write "src/core/commentary.ts" ""
          write "src/core/engine.ts" ""
          write "src/bot/commands.ts" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          rm -f package-lock.json
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v113-deterministic
          git add -A
          git commit -m "V113: Deterministischer Impuls-Finder, Gemini optional als Kommentator, LangGraph/zod entfernt, correctionLegs-Fix"
          git push -u origin feat/v113-deterministic --force
          gh pr create --base main --head feat/v113-deterministic \
            --title "V113: Deterministische EW-Engine (LLM optional)" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v113-deterministic"
          {
            echo "### ✅ V113 gebaut & gepusht"
            echo ""
            echo "Branch: \`feat/v113-deterministic\` – PR reviewen und mergen."
          } >> "$GITHUB_STEP_SUMMARY"

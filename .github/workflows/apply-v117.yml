name: "🔧 Apply V117 (Short-Symmetrie)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v117:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/fibCluster.ts" ""
          write "src/core/db.ts" ""
          write "src/core/setups.ts" ""
          write "src/core/outcome.ts" ""
          write "src/core/correction.ts" ""
          write "src/core/engine.ts" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v117-short-symmetrie
          git add -A
          git commit -m "V117: Symmetrische Short-Setups - Widerstands-Cluster, richtungsbewusste State Machine & Outcome, Regelwerk v3.4"
          git push -u origin feat/v117-short-symmetrie --force
          gh pr create --base main --head feat/v117-short-symmetrie \
            --title "V117: Short-Symmetrie" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v117-short-symmetrie"
          {
            echo "### ✅ V117 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

name: "🔧 Apply V116.1 (Enthaltungs-Gebot DK-7)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v1161:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/impulseFinder.ts" ""
          write "src/core/engine.ts" ""
          write "src/bot/commands.ts" ""
          write "python_service/drawer.py" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build
          python3 -m py_compile python_service/drawer.py

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v116-1-dk7
          git add -A
          git commit -m "V116.1: DK-7 Enthaltungs-Gebot - nicht-gierige Aufloesungs-Leiter, Fallback-Schwelle 8/12, Enthaltungs-Modus mit nacktem Chart"
          git push -u origin feat/v116-1-dk7 --force
          gh pr create --base main --head feat/v116-1-dk7 \
            --title "V116.1: Enthaltungs-Gebot (DK-7)" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v116-1-dk7"
          {
            echo "### ✅ V116.1 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

name: "🔧 Apply V115 (Qualitäts-Trio + Klassifikator)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v115:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/marketData.ts" ""
          write "src/core/quality.ts" ""
          write "src/core/correction.ts" ""
          write "src/core/engine.ts" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v115-quality-trio
          git add -A
          git commit -m "V115: Kanal-/Volumen-/Fib-Zeit-Checks + Korrektur-Klassifikator mit KO-Ziel-Injektion, Regelwerk v3.1"
          git push -u origin feat/v115-quality-trio --force
          gh pr create --base main --head feat/v115-quality-trio \
            --title "V115: Kanal · Volumen · Fib-Zeit · Korrektur-Klassifikator" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v115-quality-trio"
          {
            echo "### ✅ V115 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

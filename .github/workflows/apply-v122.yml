name: "🔧 Apply V122 (MCO-Report · Range)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v122:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/engine.ts" ""
          write "src/bot/commands.ts" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v122-mco-report
          git add -A
          git commit -m "V122: MCO-Reportstruktur (Big Picture, 2 Szenarien, Level) + /analyse Range-Parameter; Detail-Chart-Versand entfernt"
          git push -u origin feat/v122-mco-report --force
          gh pr create --base main --head feat/v122-mco-report \
            --title "V122: MCO-Report · Fenster-Parameter" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v122-mco-report"
          {
            echo "### ✅ V122 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

name: "🔧 Apply Refactor V111"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🗑️ Alte Struktur entfernen"
        run: |
          git rm -f --ignore-unmatch src/bot.ts src/prompt.ts src/db.ts src/stats.ts src/scheduler.ts src/radarManager.ts src/engine.ts yarn.lock

      - name: "✍️ Neue Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write ".gitignore" "bm9kZV9tb2R1bGVzLwpkaXN0LwpkYXRhLwouZW52CioubG9nCg=="
          write "package.json" ""
          write "tsconfig.json" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "src/bot/commands.ts" ""
          write "src/core/db.ts" ""
          write "src/core/marketData.ts" ""
          write "src/core/chart.ts" ""
          write "src/core/watchlist.ts" ""
          write "src/core/outcome.ts" ""
          write "src/core/stats.ts" ""
          write "src/core/engine.ts" ""
          write "src/graph/ewValidator.ts" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B refactor/v111-konsolidierung
          git add -A
          git commit -m "V111: Konsolidierung – ein Entry Point, SQLite-only, Chart-Pipeline & Outcome-Tracking verdrahtet"
          git push -u origin refactor/v111-konsolidierung --force
          gh pr create --base main --head refactor/v111-konsolidierung \
            --title "V111: Konsolidierter Composition Root" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden (Repo-Setting). Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...refactor/v111-konsolidierung"
          {
            echo "### ✅ Refactor V111 gebaut & gepusht"
            echo ""
            echo "Branch: \`refactor/v111-konsolidierung\` – jetzt den Pull Request reviewen und mergen."
          } >> "$GITHUB_STEP_SUMMARY"

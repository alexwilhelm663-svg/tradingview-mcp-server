name: "🔧 Apply V112.2 (Doktrin + Log-Konvention)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v1122:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/fibCluster.ts" ""
          write "src/graph/ewValidator.ts" ""
          write "src/core/chart.ts" ""
          write "src/core/engine.ts" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "python_service/drawer.py" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build
          python3 -m py_compile python_service/drawer.py

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v112-2-doktrin
          git add -A
          git commit -m "V112.2: Saekulare Doktrin im Validator, duale Fib-Konvention, drawer.py rendert Engine-Level"
          git push -u origin feat/v112-2-doktrin --force
          gh pr create --base main --head feat/v112-2-doktrin \
            --title "V112.2: Säkulare Doktrin + einheitliche Fib-Konvention" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v112-2-doktrin"
          {
            echo "### ✅ V112.2 gebaut & gepusht"
            echo ""
            echo "Branch: \`feat/v112-2-doktrin\` – PR reviewen und mergen."
          } >> "$GITHUB_STEP_SUMMARY"

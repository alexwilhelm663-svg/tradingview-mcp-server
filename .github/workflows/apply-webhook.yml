name: "🔧 Apply Webhook-Patch V111.1"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ index.ts ersetzen"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/index.ts" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B patch/webhook-mode
          git add -A
          git commit -m "V111.1: Webhook-Modus – Telegram-Updates als eingehender Traffic, 409-frei, Launch-Fehlerbehandlung"
          git push -u origin patch/webhook-mode --force
          gh pr create --base main --head patch/webhook-mode \
            --title "V111.1: Webhook-Modus statt Polling" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...patch/webhook-mode"
          {
            echo "### ✅ Webhook-Patch gebaut & gepusht"
            echo ""
            echo "Branch: \`patch/webhook-mode\` – PR reviewen und mergen."
          } >> "$GITHUB_STEP_SUMMARY"

name: "🔧 Apply V120 (Koenz/EWI · Fib-Zeit · gemessen)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v120:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/impulseFinder.ts" ""
          write "src/core/quality.ts" ""
          write "src/core/diagonal.ts" ""
          write "src/core/completion.ts" ""
          write "src/core/engine.ts" ""
          write "src/core/chart.ts" ""
          write "python_service/drawer.py" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build
          python3 -m py_compile python_service/drawer.py

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v120-koenz
          git add -A
          git commit -m "V120: Koenz/EWI-Integration - HR-6, typbewusste Qualitaet, Fib-Zeit-Baender+Fenster, EWI-Diagonalen; Selektion per Walk-Forward-Ablation auf V119-Edge gehalten"
          git push -u origin feat/v120-koenz --force
          gh pr create --base main --head feat/v120-koenz \
            --title "V120: Koenz/EWI · Fib-Zeit-Fenster · messbasiert" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v120-koenz"
          {
            echo "### ✅ V120 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

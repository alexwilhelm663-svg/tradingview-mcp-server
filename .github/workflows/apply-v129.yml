name: "🔧 Apply V129 (Tageskerzen-Chart)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v129:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/bot/commands.ts" ""
          write "src/core/engine.ts" ""
          write "src/core/chart.ts" ""
          write "python_service/drawer.py" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build
          python3 -m py_compile python_service/drawer.py

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v129-tageskerzen
          git add -A
          git commit -m "V129: Tageskerzen-Chart - Intervall-Argument 1d/1w durch die Kette, echte OHLC-Candlesticks im Drawer; Expanded-Flat-Segmentierung als offen dokumentiert (Fix-Versuch zurueckgerollt)"
          git push -u origin feat/v129-tageskerzen --force
          gh pr create --base main --head feat/v129-tageskerzen \
            --title "V129: Tageskerzen im Chart" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR manuell: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v129-tageskerzen"
          {
            echo "### ✅ V129 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

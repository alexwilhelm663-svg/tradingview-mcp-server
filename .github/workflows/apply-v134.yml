name: "🔧 Apply V134 (Koenz 0.618-Trick)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v134:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/correction.ts" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v134-koenz-618
          git add -A
          git commit -m "V134: Koenz 0.618-Bestaetigungs-Trick (fruehe ABC-vs-Impuls-Diskriminante) + Zeit-Diskriminante; Koenz-Abgleich dokumentiert; Regelwerk v5.3"
          git push -u origin feat/v134-koenz-618 --force
          gh pr create --base main --head feat/v134-koenz-618 \
            --title "V134: Koenz 0.618-Trick + Zeit-Diskriminante" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR manuell: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v134-koenz-618"
          {
            echo "### ✅ V134 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

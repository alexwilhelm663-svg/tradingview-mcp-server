name: "🔧 Apply V114 (Qualität + Kritiker)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v114:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/quality.ts" ""
          write "src/core/commentary.ts" ""
          write "src/core/engine.ts" ""
          write "src/core/setups.ts" ""
          write "src/core/db.ts" ""
          write "src/core/stats.ts" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v114-quality-critic
          git add -A
          git commit -m "V114: Divergenz- & Subwellen-Checks, strukturierter LLM-Kritiker mit Vorsichts-Asymmetrie, Kritiker-Kalibrierung in OKF"
          git push -u origin feat/v114-quality-critic --force
          gh pr create --base main --head feat/v114-quality-critic \
            --title "V114: Qualitäts-Checks + Kritiker-Kalibrierung" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v114-quality-critic"
          {
            echo "### ✅ V114 gebaut & gepusht"
            echo ""
            echo "Branch: \`feat/v114-quality-critic\` – PR reviewen und mergen."
          } >> "$GITHUB_STEP_SUMMARY"

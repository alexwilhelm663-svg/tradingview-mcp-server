name: "🔧 Apply V127 (DK-9 Widerspruch-Fix)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v127:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/engine.ts" ""
          write "src/core/completion.ts" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B fix/v127-dk9-widerspruch
          git add -A
          git commit -m "V127: DK-9/Korrektur-Synchronisation - Welle-5-laeuft-noch schweigt bei aktiver Korrektur ab W5 (Praemissen-Check), behebt Selbst-Widerspruch"
          git push -u origin fix/v127-dk9-widerspruch --force
          gh pr create --base main --head fix/v127-dk9-widerspruch \
            --title "V127: DK-9 Selbst-Widerspruch behoben" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR manuell: https://github.com/$GITHUB_REPOSITORY/compare/main...fix/v127-dk9-widerspruch"
          {
            echo "### ✅ V127 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

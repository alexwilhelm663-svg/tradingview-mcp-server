name: "🔧 Apply V135 (Koenz Multi-1-2)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v135:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/multiWave.ts" ""
          write "src/core/correction.ts" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v135-multi-1-2
          git add -A
          git commit -m "V135: Koenz staffelnde Multi-1-2-Invalidierung (KO-7e) - wandernde Stop-Marke mit Intakt-Pruefung, gekoppelt an Umschlag-Verdacht; Koenz-Abgleich vollstaendig; Regelwerk v5.4"
          git push -u origin feat/v135-multi-1-2 --force
          gh pr create --base main --head feat/v135-multi-1-2 \
            --title "V135: Koenz Multi-1-2 wandernde Invalidierung" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR manuell: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v135-multi-1-2"
          {
            echo "### ✅ V135 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

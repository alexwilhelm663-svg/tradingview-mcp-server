name: "🔧 Apply V123 (Grad-Konsistenz · Sub-Zählungen)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v123:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/impulseFinder.ts" ""
          write "src/core/engine.ts" ""
          write "src/core/chart.ts" ""
          write "python_service/drawer.py" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build
          python3 -m py_compile python_service/drawer.py

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v123-degree
          git add -A
          git commit -m "V123: HR-6 im Log-Raum, HR-7 Grad-Konsistenz (Preis x Zeit), Sub-Zaehlungen i-v im Hauptchart; Expectancy 7.9->10.2%"
          git push -u origin feat/v123-degree --force
          gh pr create --base main --head feat/v123-degree \
            --title "V123: Grad-Konsistenz · Sub-Zählungen im Chart" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v123-degree"
          {
            echo "### ✅ V123 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

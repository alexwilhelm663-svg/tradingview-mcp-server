name: "🔧 Apply V117.3 (DK-8 Klare-Impuls-Pflicht)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v1173:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/impulseFinder.ts" ""
          write "src/core/quality.ts" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B patch/v117-3-dk8
          git add -A
          git commit -m "V117.3: DK-8 Klare-Impuls-Pflicht - Diagonal-W3 unzulaessig, Top-5-Walk-down, positionsbewusste Qualitaet, Regelwerk v3.7"
          git push -u origin patch/v117-3-dk8 --force
          gh pr create --base main --head patch/v117-3-dk8 \
            --title "V117.3: DK-8 — keine Diagonalen als Welle 3" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...patch/v117-3-dk8"
          {
            echo "### ✅ V117.3 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

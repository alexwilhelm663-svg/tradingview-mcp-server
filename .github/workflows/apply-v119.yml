name: "🔧 Apply V119 (Rand-Fix · O(k²) · Backtest)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v119:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/impulseFinder.ts" ""
          write "src/backtest.ts" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v119-backtest
          git add -A
          git commit -m "V119: Rand-Extrem-Synthese, O(k2)-Kandidatensuche (163x), Walk-Forward-Backtest mit R/Expectancy-Report"
          git push -u origin feat/v119-backtest --force
          gh pr create --base main --head feat/v119-backtest \
            --title "V119: Rand-Fix · O(k²) · Walk-Forward-Backtest" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v119-backtest"
          {
            echo "### ✅ V119 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

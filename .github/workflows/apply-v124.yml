name: "🔧 Apply V124 (Diagonalen verworfen · KO-Katalog)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v124:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/correction.ts" ""
          write "src/core/impulseFinder.ts" ""
          write "src/core/quality.ts" ""
          write "src/core/completion.ts" ""
          write "src/core/engine.ts" ""
          write "src/core/diagonal.ts" "Ly8gVjEyNDogRGlhZ29uYWwtTXVzdGVyIHBlciBOdXR6ZXItRXJsYXNzIGF1cyBkZW0gTW9kZWxsIGVudGZlcm50LgovLyBIaXN0b3JpZTogVjExNiAoREctMSksIFYxMjAgKEVXSS1VcGRhdGUpLiBNb2R1bCBiZXd1c3N0IGxlZXIgYmVsYXNzZW4sCi8vIGRhbWl0IGRpZSBFbnRzY2hlaWR1bmcgaW0gUmVwbyBzaWNodGJhciBibGVpYnQuCmV4cG9ydCB7fTsK"
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build
          python3 -m py_compile python_service/drawer.py

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v124-ko-katalog
          git add -A
          git commit -m "V124: Diagonalen verworfen (Erlass), Korrektur-Vollkatalog KO-1..6 mit Struktur-Beweis, Audit Theorie/Regelwerk/Code, Regelwerk v4.3"
          git push -u origin feat/v124-ko-katalog --force
          gh pr create --base main --head feat/v124-ko-katalog \
            --title "V124: Diagonalen verworfen · Korrektur-Vollkatalog" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR manuell: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v124-ko-katalog"
          {
            echo "### ✅ V124 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

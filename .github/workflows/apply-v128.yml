name: "🔧 Apply V128 (A-Bein-Struktur)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v128:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/impulseFinder.ts" ""
          write "src/core/engine.ts" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B fix/v128-a-bein-struktur
          git add -A
          git commit -m "V128: A-Bein-Struktur - absolute Sub-Stufen + Geradlinigkeits-Fallback in segmentVerdict, erste A-B-C-Sequenz statt globaler Extrema; behebt falsches A-Struktur-unklar (CRCL)"
          git push -u origin fix/v128-a-bein-struktur --force
          gh pr create --base main --head fix/v128-a-bein-struktur \
            --title "V128: A-Bein-Struktur richtig erkannt" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR manuell: https://github.com/$GITHUB_REPOSITORY/compare/main...fix/v128-a-bein-struktur"
          {
            echo "### ✅ V128 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"

name: "🔧 Apply V121 (Gates messbasiert)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  v121:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "✍️ Dateien schreiben"
        run: |
          write() { mkdir -p "$(dirname "$1")"; echo "$2" | base64 -d > "$1"; echo "✓ $1"; }
          write "src/core/engine.ts" ""
          write "src/core/setups.ts" ""
          write "src/backtest.ts" ""
          write "knowledge/rules/elliott_rules.md" ""
          write "src/index.ts" ""
          write "package.json" ""
          write "/tmp/pr_body.md" ""

      - name: "🟢 Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "🧪 Build-Verifikation (Gate vor Commit)"
        run: |
          npm install
          npm run build

      - name: "🌿 Branch, Commit & Pull Request"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B feat/v121-gates
          git add -A
          git commit -m "V121: Score>=3-Gate + Ziel-Guard (hart, messbasiert); Zeitfenster als Konfluenz-Marker (Hard-Gate per Messung verworfen)"
          git push -u origin feat/v121-gates --force
          gh pr create --base main --head feat/v121-gates \
            --title "V121: Setup-Gates — messbasiert" \
            --body-file /tmp/pr_body.md \
            || echo "::warning::PR konnte nicht automatisch angelegt werden. Manuell oeffnen: https://github.com/$GITHUB_REPOSITORY/compare/main...feat/v121-gates"
          {
            echo "### ✅ V121 gebaut & gepusht"
          } >> "$GITHUB_STEP_SUMMARY"
